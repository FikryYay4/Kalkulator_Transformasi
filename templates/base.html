<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LogicLab - Terminal kalkulator cybersecurity dengan operasi aritmatika, logika digital, dan transformasi bilangan.">
    <meta name="keywords" content="kalkulator, binary, logic gates, number conversion, cybersecurity, terminal">
    <title>{% block title %}LogicLab - Cyber Calculator{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/cyber-theme.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/light-theme.css') }}" rel="stylesheet">
    
    <style>
        /* Preload animation */
        .preloader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a0e27;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .preloader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .preloader-text {
            font-family: 'Orbitron', monospace;
            color: #00ff87;
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(0,255,135,0.5);
        }
        .preloader-text::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="preloader-text">INITIALIZING SYSTEM</div>
    </div>

    <!-- Cyber Grid Background -->
    <div class="cyber-grid"></div>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top" id="mainNavbar">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-terminal-fill"></i> LOGICLAB
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <i class="bi bi-list" style="font-size:1.4rem; color: var(--text-primary);"></i>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav ms-auto me-3 gap-1">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
                            <i class="bi bi-house-fill"></i> Beranda
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'aritmatika' %}active{% endif %}" href="/aritmatika">
                            <i class="bi bi-plus-slash-minus"></i> Aritmatika
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'logika' %}active{% endif %}" href="/logika">
                            <i class="bi bi-diagram-3-fill"></i> Logika
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'konversi' %}active{% endif %}" href="/konversi">
                            <i class="bi bi-arrow-left-right"></i> Konversi
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'bonus' %}active{% endif %}" href="/bonus">
                            <i class="bi bi-stars"></i> Bonus
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'riwayat' %}active{% endif %}" href="/riwayat">
                            <i class="bi bi-clock-history"></i> Riwayat
                        </a>
                    </li>
                </ul>
                <button class="theme-toggle" id="themeToggle" title="Ganti Tema">
                    <i class="bi bi-moon-fill" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-3">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="mb-0">
                <i class="bi bi-shield-lock-fill"></i> 
                &copy; 2026 LOGICLAB &mdash; Cyber Calculator Terminal v2.0 
                <span class="ms-2" style="color: var(--cyber-green);">[SECURE CONNECTION]</span>
            </p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/cyber-sound.js') }}"></script>
    <script src="{{ url_for('static', filename='js/logic-gate-visualizer.js') }}"></script>
    
    <script>
        // Preloader
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('preloader').classList.add('hidden');
                if (window.cyberSound) {
                    window.cyberSound.scan();
                }
            }, 800);
        });

        // Matrix rain effect (optional - can be heavy on performance)
        function createMatrixRain() {
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '0';
            canvas.style.opacity = '0.15';
            document.body.insertBefore(canvas, document.body.firstChild);

            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function draw() {
                ctx.fillStyle = 'rgba(10, 14, 39, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#00ff87';
                ctx.font = fontSize + 'px monospace';

                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }

            // Only enable matrix rain in dark theme
            let intervalId;
            function checkTheme() {
                const theme = document.documentElement.getAttribute('data-theme');
                if (theme === 'dark' && !intervalId) {
                    intervalId = setInterval(draw, 50);
                    canvas.style.display = 'block';
                } else if (theme !== 'dark' && intervalId) {
                    clearInterval(intervalId);
                    intervalId = null;
                    canvas.style.display = 'none';
                }
            }

            checkTheme();
            // Watch for theme changes
            const observer = new MutationObserver(checkTheme);
            observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

            // Resize handler
            window.addEventListener('resize', function() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // Initialize matrix rain (comment out if too heavy)
        if (document.documentElement.getAttribute('data-theme') === 'dark') {
            createMatrixRain();
        }

        // Scan line effect on page load
        function addScanLine() {
            const scanLine = document.createElement('div');
            scanLine.className = 'scan-line';
            document.body.appendChild(scanLine);
            setTimeout(() => scanLine.remove(), 3000);
        }

        // Add scan effect on navigation
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.href && !this.href.includes('#')) {
                    addScanLine();
                }
            });
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
