<!DOCTYPE html>
<html lang="id" data-theme="dark" class="theme-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LogicLab - Terminal kalkulator cybersecurity dengan operasi aritmatika, logika digital, dan transformasi bilangan.">
    <meta name="keywords" content="kalkulator, binary, logic gates, number conversion, cybersecurity, terminal">
    <title>{% block title %}LogicLab - Cyber Calculator{% endblock %}</title>
    
    <!-- CRITICAL: Set theme BEFORE any rendering -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.documentElement.className = 'theme-' + savedTheme;
        })();
    </script>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/cyber-theme.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/light-theme.css') }}" rel="stylesheet">
    
    <style>
        /* Preload animation - Dark Mode */
        .preloader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a0e27;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        /* Light Mode Preloader */
        [data-theme="light"] .preloader,
        html.theme-light .preloader {
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
            background-size: 400% 400%;
            animation: gradientShift 3s ease infinite;
        }
        
        .preloader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .preloader-text {
            font-family: 'Orbitron', monospace;
            color: #00ff87;
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(0,255,135,0.5);
            letter-spacing: 2px;
        }
        
        /* Light Mode Preloader Text */
        [data-theme="light"] .preloader-text,
        html.theme-light .preloader-text {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .preloader-text::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="preloader-text" id="preloaderText">INITIALIZING SYSTEM</div>
    </div>
    
    <script>
        // Apply theme to preloader text immediately
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            const preloader = document.getElementById('preloader');
            const preloaderText = document.getElementById('preloaderText');
            
            if (preloader && preloaderText) {
                if (savedTheme === 'light') {
                    preloader.style.background = 'linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe)';
                    preloader.style.backgroundSize = '400% 400%';
                    preloader.style.animation = 'gradientShift 3s ease infinite';
                    preloaderText.style.color = '#ffffff';
                    preloaderText.style.textShadow = '0 0 20px rgba(255,255,255,0.8), 0 2px 10px rgba(0,0,0,0.3)';
                } else {
                    preloader.style.background = '#0a0e27';
                    preloaderText.style.color = '#00ff87';
                    preloaderText.style.textShadow = '0 0 10px rgba(0,255,135,0.5)';
                }
            }
        })();
    </script>

    <!-- Cyber Grid Background -->
    <div class="cyber-grid"></div>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top" id="mainNavbar">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-terminal-fill"></i> LOGICLAB
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <i class="bi bi-list" style="font-size:1.4rem; color: var(--text-primary);"></i>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav ms-auto me-3 gap-1">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
                            <i class="bi bi-house-fill"></i> Beranda
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'aritmatika' %}active{% endif %}" href="/aritmatika">
                            <i class="bi bi-plus-slash-minus"></i> Aritmatika
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'logika' %}active{% endif %}" href="/logika">
                            <i class="bi bi-diagram-3-fill"></i> Logika
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'konversi' %}active{% endif %}" href="/konversi">
                            <i class="bi bi-arrow-left-right"></i> Konversi
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'bonus' %}active{% endif %}" href="/bonus">
                            <i class="bi bi-stars"></i> Bonus
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'riwayat' %}active{% endif %}" href="/riwayat">
                            <i class="bi bi-clock-history"></i> Riwayat
                        </a>
                    </li>
                </ul>
                <button class="theme-toggle" id="themeToggle" title="Ganti Tema">
                    <i class="bi bi-moon-fill" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-3">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="mb-0">
                <i class="bi bi-shield-lock-fill"></i> 
                &copy; 2026 LOGICLAB &mdash; Cyber Calculator Terminal v2.0 
                <span class="ms-2" style="color: var(--cyber-green);">[SECURE CONNECTION]</span>
            </p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/cyber-sound.js') }}"></script>
    <script src="{{ url_for('static', filename='js/logic-gate-visualizer.js') }}"></script>
    
    <script>
        // Preloader
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('preloader').classList.add('hidden');
                if (window.cyberSound) {
                    window.cyberSound.scan();
                }
            }, 800);
        });
        
        // CRITICAL: Apply theme immediately when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            applyThemeToAllElements();
        });
        
        // Also apply after a short delay to catch any late-loading elements
        setTimeout(function() {
            applyThemeToAllElements();
        }, 100);
        
        function applyThemeToAllElements() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            const html = document.documentElement;
            html.setAttribute('data-theme', savedTheme);
            html.className = 'theme-' + savedTheme;
            document.body.classList.remove('theme-light', 'theme-dark');
            document.body.classList.add('theme-' + savedTheme);
            
            console.log('Applying theme:', savedTheme);
            
            // Apply body styles
            if (savedTheme === 'dark') {
                document.body.style.cssText = 'background: #0a0e27 !important; background-color: #0a0e27 !important; color: #00ff87 !important;';
            } else {
                document.body.style.cssText = 'background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe) !important; background-size: 400% 400% !important; animation: gradientShift 15s ease infinite !important; color: #1a1a2e !important;';
            }
            
            // Force update navbar with cssText
            const navbar = document.querySelector('.navbar-custom');
            if (navbar) {
                if (savedTheme === 'dark') {
                    navbar.style.cssText = 'background: rgba(10, 14, 39, 0.98) !important; background-color: rgba(10, 14, 39, 0.98) !important; border-bottom: 2px solid #00ff87 !important; box-shadow: 0 0 20px rgba(0,255,135,0.3) !important;';
                    console.log('Navbar set to dark');
                } else {
                    navbar.style.cssText = 'background: rgba(255, 255, 255, 0.98) !important; background-color: rgba(255, 255, 255, 0.98) !important; border-bottom: 3px solid rgba(102, 102, 241, 0.5) !important; box-shadow: 0 4px 30px rgba(102,102,241,0.4) !important;';
                    console.log('Navbar set to light');
                }
            }
            
            // Force update all cards with cssText
            const cards = document.querySelectorAll('.feature-card, .calc-card');
            console.log('Found cards:', cards.length);
            cards.forEach((card, index) => {
                if (savedTheme === 'dark') {
                    card.style.cssText = 'background: rgba(15, 20, 25, 0.95) !important; background-color: rgba(15, 20, 25, 0.95) !important; border: 2px solid rgba(0, 255, 135, 0.3) !important; border-color: rgba(0, 255, 135, 0.3) !important; box-shadow: 0 8px 32px rgba(0,0,0,0.8) !important;';
                    console.log('Card', index, 'set to dark');
                } else {
                    card.style.cssText = 'background: rgba(255, 255, 255, 0.95) !important; background-color: rgba(255, 255, 255, 0.95) !important; border: 2px solid rgba(102, 102, 241, 0.4) !important; border-color: rgba(102, 102, 241, 0.4) !important; box-shadow: 0 8px 32px rgba(102,102,241,0.3) !important;';
                    console.log('Card', index, 'set to light');
                }
            });
            
            // Force update all form controls
            const formControls = document.querySelectorAll('.form-control-custom, .form-select-custom, select, input[type="text"], input[type="number"]');
            formControls.forEach(control => {
                if (savedTheme === 'dark') {
                    control.style.cssText = 'background: rgba(0, 0, 0, 0.7) !important; background-color: rgba(0, 0, 0, 0.7) !important; border: 2px solid rgba(0, 255, 135, 0.4) !important; border-color: rgba(0, 255, 135, 0.4) !important; color: #00ff87 !important;';
                } else {
                    control.style.cssText = 'background: rgba(255, 255, 255, 0.95) !important; background-color: rgba(255, 255, 255, 0.95) !important; border: 2px solid rgba(102, 102, 241, 0.4) !important; border-color: rgba(102, 102, 241, 0.4) !important; color: #1a1a2e !important;';
                }
            });
            
            console.log('Theme applied successfully');
        }

        // Matrix/Cyber rain effect - Works for both themes
        function createCyberRain() {
            const canvas = document.createElement('canvas');
            canvas.id = 'cyberRainCanvas';
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '0';
            document.body.insertBefore(canvas, document.body.firstChild);

            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Characters for the rain
            const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン<>{}[]()';
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            let intervalId;

            function draw() {
                const theme = document.documentElement.getAttribute('data-theme');
                
                if (theme === 'dark') {
                    // Dark mode - Matrix green
                    ctx.fillStyle = 'rgba(10, 14, 39, 0.05)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#00ff87';
                    canvas.style.opacity = '0.15';
                } else {
                    // Light mode - Cyber blue/purple
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // Random colors for light mode
                    const colors = ['rgba(102, 102, 241, 0.6)', 'rgba(139, 92, 246, 0.6)', 'rgba(236, 72, 153, 0.6)'];
                    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                    canvas.style.opacity = '0.25';
                }

                ctx.font = fontSize + 'px "Share Tech Mono", monospace';

                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }

            function startRain() {
                if (!intervalId) {
                    intervalId = setInterval(draw, 50);
                    canvas.style.display = 'block';
                }
            }

            function stopRain() {
                if (intervalId) {
                    clearInterval(intervalId);
                    intervalId = null;
                    canvas.style.display = 'none';
                }
            }

            // Start rain
            startRain();

            // Watch for theme changes
            const observer = new MutationObserver(() => {
                // Just continue drawing with new colors
                if (!intervalId) startRain();
            });
            observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

            // Resize handler
            window.addEventListener('resize', function() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });

            return { start: startRain, stop: stopRain };
        }

        // Initialize cyber rain
        const cyberRain = createCyberRain();

        // Scan line effect on page load
        function addScanLine() {
            const scanLine = document.createElement('div');
            scanLine.className = 'scan-line';
            document.body.appendChild(scanLine);
            setTimeout(() => scanLine.remove(), 3000);
        }

        // Add scan effect on navigation
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.href && !this.href.includes('#')) {
                    addScanLine();
                }
            });
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
